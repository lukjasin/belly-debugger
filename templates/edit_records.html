{% extends "base.html" %}
{% set active = "edit_records" %}
{% block content %}

<div class="page-header">
  <h2>Edit Records</h2>
  <p>Find and correct previously logged meals.</p>
</div>

<form method="get" action="/edit-records" style="display:flex; gap:1rem; align-items:flex-end; margin-bottom:1rem;">
  <label style="margin:0">
    Show last N days
    <input type="number" name="days" value="{{ days }}" min="1" max="30" style="width:6rem" />
  </label>
  <button type="submit" style="margin:0">Refresh</button>
</form>

{% if not meals %}
  <p>No meals found for the selected period.</p>
{% else %}

<label>Select a meal to edit
  <select id="meal_selector" onchange="fillForm(this.value)">
    <option value="">— pick a meal —</option>
    {% for m in meals %}
    <option value="{{ loop.index0 }}">{{ m.label }}</option>
    {% endfor %}
  </select>
</label>

<hr />

<form method="post" action="/edit-records" id="edit_form" style="display:none">
  <input type="hidden" name="days" value="{{ days }}" />
  <input type="hidden" name="old_time_utc" id="f_old_time_utc" />

  <fieldset>
    <legend>General</legend>
    <label>Meal Name
      <input type="text" name="meal_name" id="f_meal_name" required />
    </label>
    <div class="grid">
      <label>Meal Type
        <select name="meal_type" id="f_meal_type">
          <option>Breakfast</option>
          <option>II Breakfast</option>
          <option>Lunch</option>
          <option>Snack</option>
          <option>Dinner</option>
        </select>
      </label>
      <label>Category
        <select name="category" id="f_category">
          <option>catering</option>
          <option>home</option>
          <option>restaurant</option>
          <option>cheat</option>
        </select>
      </label>
      <label>Source
        <select name="source" id="f_source">
          <option>Brokul</option>
          <option>Homemade</option>
          <option>Store</option>
          <option>Restaurant</option>
        </select>
      </label>
    </div>
  </fieldset>

  <fieldset>
    <legend>Date & Time</legend>
    <div class="grid">
      <label>Date <input type="date" name="log_date" id="f_log_date" required /></label>
      <label>Time <input type="time" name="log_time_val" id="f_log_time" required /></label>
    </div>
  </fieldset>

  <fieldset>
    <legend>Nutritional Values</legend>
    <div class="grid">
      <label>kcal       <input type="number" name="kcal"    id="f_kcal"    min="0" step="1"   /></label>
      <label>Fat (g)    <input type="number" name="fat"     id="f_fat"     min="0" step="0.1" /></label>
      <label>Sat. Fat (g) <input type="number" name="fat_sat" id="f_fat_sat" min="0" step="0.1" /></label>
      <label>Carbs (g)  <input type="number" name="carb"   id="f_carb"   min="0" step="0.1" /></label>
    </div>
    <div class="grid">
      <label>Sugars (g) <input type="number" name="sugars" id="f_sugars" min="0" step="0.1" /></label>
      <label>Protein (g)<input type="number" name="prot"   id="f_prot"   min="0" step="0.1" /></label>
      <label>Salt (g)   <input type="number" name="salt"   id="f_salt"   min="0" step="0.01" /></label>
    </div>
  </fieldset>

  <button type="submit">Save Changes</button>
</form>

{% endif %}

<script>
const meals = {{ meals | tojson }};

function fillForm(idx) {
  if (idx === "") { document.getElementById("edit_form").style.display = "none"; return; }
  const m = meals[parseInt(idx)];
  document.getElementById("edit_form").style.display = "";
  document.getElementById("f_old_time_utc").value = m._time_utc_iso;
  document.getElementById("f_meal_name").value     = m.name;
  document.getElementById("f_log_date").value      = m._time_local.slice(0, 10);
  document.getElementById("f_log_time").value      = m._time_local.slice(11, 16);
  document.getElementById("f_kcal").value          = m.kcal;
  document.getElementById("f_fat").value           = m.fat;
  document.getElementById("f_fat_sat").value       = m.fat_sat;
  document.getElementById("f_carb").value          = m.carbs;
  document.getElementById("f_sugars").value        = m.sugars;
  document.getElementById("f_prot").value          = m.protein;
  document.getElementById("f_salt").value          = m.salt;
  setSelect("f_meal_type", m.type);
  setSelect("f_category",  m.category);
  setSelect("f_source",    m.source);
}

function setSelect(id, value) {
  const sel = document.getElementById(id);
  for (let opt of sel.options) { if (opt.value === value) { opt.selected = true; break; } }
}
</script>

{% endblock %}
