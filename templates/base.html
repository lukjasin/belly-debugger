<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ app_name }}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" />
  <style>
    :root {
      --pico-font-size: 15px;
      --accent: #5eead4;
      --accent-dim: rgba(94, 234, 212, 0.08);
      --surface: #111827;
      --surface-raised: #1a2332;
      --border: rgba(255,255,255,0.07);
    }

    body {
      background: var(--surface);
    }

    /* ── Top nav bar ─────────────────────────────────────────── */
    .topbar {
      background: var(--surface-raised);
      border-bottom: 1px solid var(--border);
      padding: 0;
    }
    .topbar-inner {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 52px;
    }
    .topbar-brand {
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      text-decoration: none;
    }
    .topbar-nav {
      display: flex;
      gap: 0.25rem;
    }
    .topbar-nav a {
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: rgba(255,255,255,0.55);
      text-decoration: none;
      padding: 0.35rem 0.75rem;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }
    .topbar-nav a:hover {
      color: rgba(255,255,255,0.9);
      background: rgba(255,255,255,0.06);
    }
    .topbar-nav a.active {
      color: var(--accent);
      background: var(--accent-dim);
    }

    /* ── Page header ─────────────────────────────────────────── */
    .page-header {
      padding: 2.5rem 0 1.5rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2rem;
    }
    .page-header h2 {
      margin: 0;
      font-size: 1.5rem;
      font-weight: 600;
      color: #f1f5f9;
    }
    .page-header p {
      margin: 0.25rem 0 0;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.4);
    }

    /* ── Flash messages ──────────────────────────────────────── */
    .flash {
      padding: 0.65rem 1rem;
      border-radius: 8px;
      font-size: 0.875rem;
      margin-bottom: 1.5rem;
    }
    .flash-success {
      background: rgba(52, 211, 153, 0.1);
      border: 1px solid rgba(52, 211, 153, 0.3);
      color: #6ee7b7;
    }
    .flash-error {
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid rgba(248, 113, 113, 0.3);
      color: #fca5a5;
    }

    /* ── Fieldsets ───────────────────────────────────────────── */
    fieldset {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.25rem 1.25rem 0.5rem;
      margin-bottom: 1.25rem;
      background: var(--surface-raised);
    }
    legend {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      padding: 0 0.5rem;
    }

    /* ── Submit button ───────────────────────────────────────── */
    button[type="submit"] {
      background: var(--accent);
      color: #0f172a;
      border: none;
      font-weight: 600;
      letter-spacing: 0.03em;
      border-radius: 8px;
      padding: 0.65rem 1.5rem;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button[type="submit"]:hover { opacity: 0.85; }

    /* ── Main container ──────────────────────────────────────── */
    .main-content {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 1.5rem 3rem;
    }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-inner">
      <a href="/" class="topbar-brand">{{ app_name }}</a>
      <nav class="topbar-nav">
        <a href="/add-meal"     class="{{ 'active' if active == 'add_meal'     else '' }}">Add Meal</a>
        <a href="/edit-records" class="{{ 'active' if active == 'edit_records' else '' }}">Edit Records</a>
        <a href="/body-weight"  class="{{ 'active' if active == 'body_weight'  else '' }}">Body Stats</a>
      </nav>
    </div>
  </div>

  <div class="main-content">
    {% if success %}<div class="flash flash-success">✓ {{ success }}</div>{% endif %}
    {% if error   %}<div class="flash flash-error">✗ {{ error }}</div>{% endif %}
    {% block content %}{% endblock %}
  </div>

</body>
</html>
